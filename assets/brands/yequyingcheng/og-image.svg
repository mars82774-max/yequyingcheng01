      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 1 0 0 0.72  0 0 1 0 0.18  0 0 0 0.65 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grain" width="64" height="64" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="12" r="1" fill="#FFFFFF" opacity="0.05"/>
      <circle cx="40" cy="28" r="1" fill="#FFFFFF" opacity="0.035"/>
      <circle cx="24" cy="52" r="1" fill="#D4AF37" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#light)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>
  <g opacity="0.28">
    <rect x="0" y="430" width="1200" height="200" fill="#020202"/>
    <rect x="70" y="345" width="92" height="285" fill="#101010"/>
    <rect x="190" y="390" width="120" height="240" fill="#0C0C0C"/>
    <rect x="335" y="318" width="84" height="312" fill="#121212"/>
    <rect x="880" y="360" width="130" height="270" fill="#0E0E0E"/>
    <rect x="1040" y="310" width="70" height="320" fill="#121212"/>
    <circle cx="155" cy="405" r="5" fill="#D4AF37"/>
    <circle cx="1010" cy="428" r="4" fill="#D4AF37"/>
