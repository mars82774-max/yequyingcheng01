<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">夜趣影城 social share image</title>
  <desc id="desc">Dark cinematic Yequ Cinema sharing image with gold logo and copy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#060606"/>
      <stop offset="0.45" stop-color="#11100D"/>
      <stop offset="1" stop-color="#1A1208"/>
    </linearGradient>
    <radialGradient id="light" cx="40%" cy="35%" r="65%">
      <stop offset="0" stop-color="#6F521A" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#201807" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFF3B0"/>
      <stop offset="0.25" stop-color="#F7D866"/>
      <stop offset="0.55" stop-color="#D4AF37"/>
      <stop offset="0.82" stop-color="#A9791D"/>
      <stop offset="1" stop-color="#FFE58A"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
