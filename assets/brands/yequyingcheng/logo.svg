<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">夜趣影城 YEQU CINEMA logo</title>
  <desc id="desc">Gold moon, play button and film-strip mark with Chinese brand text.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFF3B0"/>
      <stop offset="0.22" stop-color="#F7D866"/>
      <stop offset="0.52" stop-color="#D4AF37"/>
      <stop offset="0.78" stop-color="#A9791D"/>
      <stop offset="1" stop-color="#FFE58A"/>
    </linearGradient>
    <linearGradient id="softGold" x1="0" x2="1">
      <stop offset="0" stop-color="#FFEFA8"/>
      <stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95  0 1 0 0 0.72  0 0 1 0 0.18  0 0 0 0.65 0" result="goldGlow"/>
      <feMerge>
        <feMergeNode in="goldGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="arcClip">
      <path d="M93 38 C145 44 166 74 168 104 C140 74 111 59 70 65 Z"/>
    </clipPath>
  </defs>

  <g filter="url(#glow)">
    <!-- crescent moon -->
    <path fill="url(#gold)" d="M111 17C74 22 45 53 45 91c0 43 35 78 78 78 27 0 51-14 65-35-13 9-29 14-46 14-43 0-78-35-78-78 0-23 10-43 26-57 7-6 14-11 21-16z"/>
    <!-- play button -->
    <path fill="url(#softGold)" d="M112 75c0-6 7-10 12-6l39 24c5 3 5 11 0 14l-39 24c-5 4-12 0-12-6V75z"/>
    <!-- film strip curve -->
    <path fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" d="M88 48C130 52 159 75 177 116"/>
    <g clip-path="url(#arcClip)" opacity="0.72" fill="#251B08">
      <rect x="98" y="54" width="9" height="10" rx="1" transform="rotate(10 98 54)"/>
      <rect x="117" y="60" width="9" height="10" rx="1" transform="rotate(19 117 60)"/>
      <rect x="135" y="70" width="9" height="10" rx="1" transform="rotate(29 135 70)"/>
      <rect x="151" y="83" width="9" height="10" rx="1" transform="rotate(39 151 83)"/>
    </g>
  </g>

  <g filter="url(#glow)">
    <text x="220" y="92" fill="url(#gold)" font-family="Noto Serif CJK TC, Noto Sans CJK TC, serif" font-size="66" font-weight="700" letter-spacing="3">夜趣影城</text>
    <line x1="224" y1="122" x2="282" y2="122" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>
    <text x="300" y="131" fill="#FFE7A3" font-family="Montserrat, Arial, sans-serif" font-size="20" letter-spacing="10">YEQU CINEMA</text>
    <line x1="580" y1="122" x2="638" y2="122" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>
  </g>
</svg>
