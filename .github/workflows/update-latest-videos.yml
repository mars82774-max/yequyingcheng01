name: Update Latest Videos

on:
  workflow_dispatch:
  schedule:
    - cron: "10 16 * * *"

permissions:
  contents: write

concurrency:
  group: update-latest-videos
  cancel-in-progress: false

jobs:
  update-latest-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CRAWL_MODE: latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Update latest videos
        run: npm run update:videos

      - name: Build
        run: npm run build

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain -- src/mockVideos.js src/videoCrawlState.json)" ]; then
            git add -- src/mockVideos.js src/videoCrawlState.json
            git commit -m "update video list"
            git push
          else
            echo "No video updates"
          fi
