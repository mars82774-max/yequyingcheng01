name: Backfill Videos

on:
  workflow_dispatch:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  contents: write

concurrency:
  group: backfill-videos
  cancel-in-progress: false

jobs:
  backfill-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CRAWL_MODE: backfill
      MAX_OLD_ITEMS: 24
      MAX_BACKFILL_PAGES: 20

    steps:
      - name: Start timer
        run: echo "WORKFLOW_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          start=$(date +%s)
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit --no-fund
          else
            npm install --prefer-offline --no-audit --no-fund
          fi
          end=$(date +%s)
          echo "[time] npm install: $((end - start))s"

      - name: Backfill old videos
        run: |
          start=$(date +%s)
          npm run update:videos
          end=$(date +%s)
          echo "[time] update:videos: $((end - start))s"

      - name: Commit changes if needed
        run: |
          start=$(date +%s)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain -- src/mockVideos.js src/videoCrawlState.json)" ]; then
            git stash push -- src/mockVideos.js src/videoCrawlState.json
            git pull --rebase origin main
            git stash pop
            git add -- src/mockVideos.js src/videoCrawlState.json
            git commit -m "update video list"
            git push
          else
            echo "No video updates"
          fi
          end=$(date +%s)
          echo "[time] git commit/push: $((end - start))s"

      - name: Total time
        if: always()
        run: |
          end=$(date +%s)
          echo "[time] total: $((end - WORKFLOW_STARTED_AT))s"
